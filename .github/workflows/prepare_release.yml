name: Draft Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  draft_release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      - name: Create Draft
        id: create_draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Creating draft release..."
          API_JSON=$(jq -n \
            --arg tag "${GITHUB_REF##*/}" \
            --arg name "Draft ${GITHUB_REF##*/}" \
            --arg body "Automatic draft build" \
            '{ tag_name: $tag, name: $name, body: $body, draft: true, prerelease: false }')
          
          RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${GITHUB_REPOSITORY}/releases \
            -d "$API_JSON")
          
          RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT

      - name: Upload JAR to Draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          JAR_FILE=$(ls target/*.jar | grep -v original | head -n1)
          echo "Uploading $JAR_FILE..."
          curl -s -H "Authorization: token $GITHUB_TOKEN" \
               -H "Content-Type: application/java-archive" \
               --data-binary @"$JAR_FILE" \
               "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${{ steps.create_draft.outputs.release_id }}/assets?name=$(basename $JAR_FILE)"
